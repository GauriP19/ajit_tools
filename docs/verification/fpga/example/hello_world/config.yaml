# yaml configuration file for linker/loader of Co-RTOS
# yaml 10 minutes tutorial:
#   https://www.youtube.com/watch?v=cdLNKUoMc6c

Hardware:
  Processor:
    # Required: Number of cores and threads per core.
    Cores: 2
    ThreadsPerCore: 1
    ISA: 32 # 32/64 bit (Default: 32)
    MMU: Yes
    FPU: Yes

  Memory:
    MaxPhysicalAddrBitWidth: 36
    Flash:
      StartAddr: 0x0  # physical address
      # EndAddr: ...
      # SizeInBytes: ...
      # SizeInKiloBytes: ...
      SizeInMegaBytes: 1
      Permissions: RXC  # (Read,Write,eXecute,Cacheable)
    RAM:
      StartAddr:   0x40000000
      # EndAddr:   0x1fffff
      # SizeInBytes: ...
      SizeInKiloBytes: 256
      #SizeInMegaBytes: 128
      Permissions: RWXC
    MMIO: # Memory Mapped IO
      StartAddr: 0x80000000  # physical address
      EndAddr:   0x8000ffff 
      # SizeInBytes: ...
      # SizeInKiloBytes: ...
      # SizeInKiloBytes: 4
      Permissions: RW

  # see ./AjitPublicResources/tools/ajit_access_routines_mt/include/device_addresses.h
  Devices:
    - Name: Timer
      MemoryRegion:
        StartAddr: 0x80000300 # physical address (in MMIO)
        SizeInBytes: 256 # 16x16
        Permissions: RW
      NamedRegisters:
        Control: 0x80000300
    - Name: InterruptController
      MemoryRegion:
        StartAddr: 0x80000200
        SizeInBytes: 32
        Permissions: RW
      NamedRegisters:
        Control: 0x80000200
    - Name: Serial
      MemoryRegion:
        StartAddr: 0x80000100
        SizeInBytes: 64
        Permissions: RW
      NamedRegisters:
        Control: 0x80000100
        TX: 0x80000104
        RX: 0x80000108
    - Name: ScratchArea
      MemoryRegion:
        StartAddr: 0x80001000
        SizeInBytes: 1024
        Permissions: RW

Software:
  StartupFuncName : setup
  BuildAndExecute:
    # Optional: Specify the log level. Default is NONE.
    # ALL < TRACE < DEBUG < INFO < ERROR < CRITICAL < NONE
    LogLevel: DEBUG
    OptimizationLevel: 2 # i.e. O2 (Accepted values: 0, 1, 2)
    # specify argument string for C compiler......
    EnableSerial: No # Yes/No (Default: Yes)
    Debug: Yes # Yes/No (Default: No)
    FirstDebugPort: 8888
    BuildArgs: "-D CLK_FREQUENCY=60000000 -D USE_VMAP"

  # Required: Which functions execute on each ajit thread.
  ProgramThreads:
    - CortosInitCalls:
        - main_00
  # One can also specify an infinite loop on the function:
  #   CortosLoopCalls:
  #     - main1
      StackSize:
        SizeInKiloBytes: 8
    - CortosInitCalls:
        - main_10
      StackSize:
        SizeInKiloBytes: 8

  #DynamicMemory: # Dynamic Memory Configuration.
    # SizeInBytes: ...
    #SizeInKiloBytes: 1000
    # SizeInMegaBytes: ...

  Locks: # Locks for synchronization between threads.
      Cacheable: 32
#     NonCacheable: 32
#
#   MessageQueues: # List of queues in the system.
#     - QueueIdStart: 0    # goes to QueueIdStart+NumOfQueues-1
#       NumOfQueues: 32
#       MessageSizeInBytes: 32
#       TotalMessageCapacity: 32 # num. of messages
#
#     - QueueIdStart: 32    # goes to QueueIdStart+NumOfQueues-1
#       NumOfQueues: 16
#       MessageSizeInBytes: 8
#       TotalMessageCapacity: 256 # num. of messages
#
#   InterruptHandler:
#     - TypeCode: 0x4
#       Function: functionName4
#     - TypeCode: 0x5
#       Function: functionName5
